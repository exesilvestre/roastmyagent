services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: roastmyagent
      POSTGRES_PASSWORD: roastmyagent
      POSTGRES_DB: roastmyagent
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U roastmyagent -d roastmyagent"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://roastmyagent:roastmyagent@db:5432/roastmyagent
      CORS_ORIGINS: http://localhost:3000
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
